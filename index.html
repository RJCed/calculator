<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div id="container">
        <div id="upper">
            <div id="top">
                <a href="https://github.com/RJCed" target="_blank" rel="noopener noreferrer" style="text-decoration: none;" >RJCed</a>
                <div id="solar"></div>
                <span><span>JS</span> CalC</span>
            </div>
            
            <div id="display">|</div>
        </div>

        <div id="button-container">

            <!-- del, 7, 4, 1, change sign button -->
            <div id="first-column">
                <button class="button special" data-action="del">Del</button>
                <button class="button number" data-val="7">7</button>
                <button class="button number" data-val="4">4</button>
                <button class="button number" data-val="1">1</button>
                <button class="button special" data-action="changeSign">+/-</button>
            </div>

            <!-- Clear, 8, 5, 2, 0 button -->
            <div id="second-column">
                <button class="button special" data-action="clear">C</button>
                <button class="button number" data-val="8">8</button>
                <button class="button number" data-val="5">5</button>
                <button class="button number" data-val="2">2</button>
                <button class="button number" data-val="0">0</button>
            </div>

            <!-- Percentage, 9, 6, 3, period button -->
            <div id="third-column">
                <button class="button operator" id="percent" data-action="percent">%</button>
                <button class="button number" data-val="9">9</button>
                <button class="button number" data-val="6">6</button>
                <button class="button number" data-val="3">3</button>
                <button class="button special number" data-val="." id="period">.</button>
            </div>

            <!-- /, *, -, +, = button -->
            <div id="fourth-column">
                <button class="button operator" data-action="divide">÷</button>
                <button class="button operator" data-action="multiply">×</button>
                <button class="button operator" data-action="subtract">-</button>
                <button class="button operator" data-action="add">+</button>
                <button class="button" id="equal" data-action="equals">=</button>
            </div>
        </div>

    </div>
</body>
</html>
