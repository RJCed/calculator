<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div id="container">
        <div id="upper">
            <div id="top">
                <a href="https://github.com/RJCed" target="_blank" rel="noopener noreferrer" style="text-decoration: none;" >RJCed</a>
                <div id="solar"></div>
                <span><span>JS</span> CalC</span>
            </div>
            
            <div id="display"></div>
        </div>

        <div id="button-container">

            <!-- del, 7, 4, 1, change sign button -->
            <div id="first-column">
                <button class="button" data-action="del">Del</button>
                <button class="button number" data-action="seven">7</button>
                <button class="button number" data-action="four">4</button>
                <button class="button number" data-action="one">1</button>
                <button class="button" data-action="changeSign">+/-</button>
            </div>

            <!-- Clear, 8, 5, 2, 0 button -->
            <div id="second-column">
                <button class="button" data-action="clear">C</button>
                <button class="button number" data-action="eight">8</button>
                <button class="button number" data-action="five">5</button>
                <button class="button number" data-action="two">2</button>
                <button class="button number" data-action="zero">0</button>
            </div>

            <!-- Percentage, 9, 6, 3, period button -->
            <div id="third-column">
                <button class="button" data-action="percent">%</button>
                <button class="button number" data-action="nine">9</button>
                <button class="button number" data-action="six">6</button>
                <button class="button number" data-action="three">3</button>
                <button class="button" data-action="period">.</button>
            </div>

            <!-- /, *, -, +, = button -->
            <div id="fourth-column">
                <button class="button operator" data-action="divide">÷</button>
                <button class="button operator" data-action="multiply">×</button>
                <button class="button operator" data-action="subtract">-</button>
                <button class="button operator" data-action="add">+</button>
                <button class="button operator" data-action="equals">=</button>
            </div>
        </div>

    </div>
</body>
</html>
